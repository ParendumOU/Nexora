services:
  # ─── Data stores ───────────────────────────────────────────────
  postgres:
    # pgvector image (PG16) for knowledge-base / memory ANN search (#201). Same
    # on-disk format as the official postgres:16, so an existing volume upgrades
    # in place; just adds the `vector` extension.
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexora}
      POSTGRES_USER: ${POSTGRES_USER:-nexora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-nexora}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  # ─── Docker socket proxy (security hardening) ──────────────────
  # The ONLY service that touches the host Docker socket. Agents spawn sandbox
  # containers (shell_run `docker ...`, docker_run/build/ps/logs, `docker compose
  # up`), and the docker CLI honors DOCKER_HOST, so backend/runner point at this
  # proxy over TCP on the internal network instead of mounting the raw socket. An
  # escaped agent then gets a locked-down subset of the Docker API, not host root.
  # Socket is mounted read-only (prevents tampering with the socket file; does NOT
  # make the API read-only; that is what the allowlist below does). No host port,
  # not behind nginx: reachable only from the internal compose network.
  # Full allow/deny policy + residual: SETUP.md "Docker socket hardening".
  docker-proxy:
    image: wollomatic/socket-proxy:1.12.3
    restart: unless-stopped
    # Run as root so it can open the host socket portably across hosts (Docker
    # Desktop and Linux map the socket's owning group differently). It stays
    # contained: cap_drop ALL + no-new-privileges + read-only rootfs, and it only
    # holds a TCP listener + the socket. On a fixed Linux host you MAY instead pin
    # user: "65534:<docker-gid>" to run unprivileged in the docker group.
    user: "0:0"
    read_only: true
    mem_limit: 64m
    pids_limit: 64
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - -loglevel=info
      - -listenip=0.0.0.0
      - -allowfrom=0.0.0.0/0
      # Bind-mount source allowlist (parses the container-create body): a bind mount
      # may only source from the agent workspace. Blocks `-v /:/host`, mounting the
      # docker socket back in, `/etc`, host secrets, etc. Named/anonymous volumes are
      # unaffected (only host-path binds are checked), so compose volumes still work.
      # Override AGENT_BIND_ROOT when the workspace is a named volume: set it to the
      # volume's host path (docker volume inspect ... -> Mountpoint, e.g.
      # /var/lib/docker/volumes/<project>_workspace_data/_data) so agent sandboxes can
      # bind the real workspace. Default /workspaces fits host-bind workspace deploys;
      # the builtin docker_run tool adds no bind mount, so it works either way.
      - -allowbindmountfrom=${AGENT_BIND_ROOT:-/workspaces}
      # Read/inspect (GET): version negotiation + containers/images/networks/volumes +
      # exec status. Denies /secrets, /configs, /swarm, /nodes, /services, /tasks,
      # /system/df, /distribution by omission (default-deny).
      - -allowGET=(/v1\.[0-9]+)?/(_ping|version|info|events.*|containers.*|images.*|networks.*|volumes.*|exec.*)
      - -allowHEAD=(/v1\.[0-9]+)?/_ping
      # Create/run/build (POST): container lifecycle + exec + image pull/build +
      # compose network/volume create. Denies POST to /swarm, /secrets, /configs,
      # /plugins, /services, /nodes, /commit, /session, /grpc by omission.
      - -allowPOST=(/v1\.[0-9]+)?/(containers/.*|exec/.*|images/.*|build.*|networks/.*|volumes/.*)
      # Cleanup (DELETE): `--rm` containers, image/network/volume prune.
      - -allowDELETE=(/v1\.[0-9]+)?/(containers/.*|images/.*|networks/.*|volumes/.*)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal

  # ─── Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nexora}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-nexora}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUN_QUEUE_ENABLED: ${RUN_QUEUE_ENABLED:-false}
      # Agents drive Docker through the filtering docker-proxy (see the docker-proxy
      # service + SETUP.md "Docker socket hardening"), never the raw host socket. The
      # docker CLI honors DOCKER_HOST, so repointing it here is the whole lever.
      DOCKER_HOST: tcp://docker-proxy:2375
      # Force the legacy builder: BuildKit needs the /session + /grpc endpoints (a
      # hijacked bidirectional stream) which the proxy does not expose. The classic
      # builder uses POST /build, which the proxy allows.
      DOCKER_BUILDKIT: "0"
      AUTH_PROVIDERS_DIR: /auth_providers
      BRAINDUMP_URL: ${BRAINDUMP_URL:-}
      BRAINDUMP_USERNAME: ${BRAINDUMP_USERNAME:-}
      BRAINDUMP_API_KEY: ${BRAINDUMP_API_KEY:-}
      ROADMAP_URL: ${ROADMAP_URL:-}
      ROADMAP_USERNAME: ${ROADMAP_USERNAME:-}
      ROADMAP_API_KEY: ${ROADMAP_API_KEY:-}
      LILDIARY_URL: ${LILDIARY_URL:-}
      LILDIARY_USERNAME: ${LILDIARY_USERNAME:-}
      LILDIARY_API_KEY: ${LILDIARY_API_KEY:-}
    volumes:
      - ./backend:/app
      - ../:/workspace-root
      - workspace_data:/workspaces
      - auth_providers_data:/auth_providers
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Runner (GitLab #219) ──────────────────────────────────────
  # Executes background runs (sub-agent dispatch, resumes) off the durable Redis
  # Stream when RUN_QUEUE_ENABLED=true. Inert otherwise (idle-blocks on an empty
  # group). Scale with `--scale runner=N`.
  runner:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    command: python -m src.runner
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nexora}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-nexora}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUN_QUEUE_ENABLED: ${RUN_QUEUE_ENABLED:-false}
      # Agents drive Docker through the filtering docker-proxy (see the docker-proxy
      # service + SETUP.md "Docker socket hardening"), never the raw host socket. The
      # docker CLI honors DOCKER_HOST, so repointing it here is the whole lever.
      DOCKER_HOST: tcp://docker-proxy:2375
      # Force the legacy builder: BuildKit needs the /session + /grpc endpoints (a
      # hijacked bidirectional stream) which the proxy does not expose. The classic
      # builder uses POST /build, which the proxy allows.
      DOCKER_BUILDKIT: "0"
      AUTH_PROVIDERS_DIR: /auth_providers
      BRAINDUMP_URL: ${BRAINDUMP_URL:-}
      BRAINDUMP_USERNAME: ${BRAINDUMP_USERNAME:-}
      BRAINDUMP_API_KEY: ${BRAINDUMP_API_KEY:-}
      ROADMAP_URL: ${ROADMAP_URL:-}
      ROADMAP_USERNAME: ${ROADMAP_USERNAME:-}
      ROADMAP_API_KEY: ${ROADMAP_API_KEY:-}
      LILDIARY_URL: ${LILDIARY_URL:-}
      LILDIARY_USERNAME: ${LILDIARY_USERNAME:-}
      LILDIARY_API_KEY: ${LILDIARY_API_KEY:-}
    volumes:
      - ./backend:/app
      - ../:/workspace-root
      - workspace_data:/workspaces
      - auth_providers_data:/auth_providers
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    networks:
      - internal

  # ─── Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  # ─── Nginx ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
      - frontend
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  workspace_data:
  auth_providers_data:
  uploads_data:

networks:
  internal:
    driver: bridge
