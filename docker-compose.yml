services:
  # ─── Data stores ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexora}
      POSTGRES_USER: ${POSTGRES_USER:-nexora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-nexora}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  # ─── Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nexora}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-nexora}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUN_QUEUE_ENABLED: ${RUN_QUEUE_ENABLED:-false}
      DOCKER_HOST: unix:///var/run/docker.sock
      AUTH_PROVIDERS_DIR: /auth_providers
      BRAINDUMP_URL: ${BRAINDUMP_URL:-}
      BRAINDUMP_USERNAME: ${BRAINDUMP_USERNAME:-}
      BRAINDUMP_API_KEY: ${BRAINDUMP_API_KEY:-}
      ROADMAP_URL: ${ROADMAP_URL:-}
      ROADMAP_USERNAME: ${ROADMAP_USERNAME:-}
      ROADMAP_API_KEY: ${ROADMAP_API_KEY:-}
      LILDIARY_URL: ${LILDIARY_URL:-}
      LILDIARY_USERNAME: ${LILDIARY_USERNAME:-}
      LILDIARY_API_KEY: ${LILDIARY_API_KEY:-}
    volumes:
      - ./backend:/app
      - ../:/workspace-root
      - /var/run/docker.sock:/var/run/docker.sock
      - workspace_data:/workspaces
      - auth_providers_data:/auth_providers
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Runner (GitLab #219) ──────────────────────────────────────
  # Executes background runs (sub-agent dispatch, resumes) off the durable Redis
  # Stream when RUN_QUEUE_ENABLED=true. Inert otherwise (idle-blocks on an empty
  # group). Scale with `--scale runner=N`.
  runner:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    command: python -m src.runner
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nexora}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-nexora}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUN_QUEUE_ENABLED: ${RUN_QUEUE_ENABLED:-false}
      DOCKER_HOST: unix:///var/run/docker.sock
      AUTH_PROVIDERS_DIR: /auth_providers
      BRAINDUMP_URL: ${BRAINDUMP_URL:-}
      BRAINDUMP_USERNAME: ${BRAINDUMP_USERNAME:-}
      BRAINDUMP_API_KEY: ${BRAINDUMP_API_KEY:-}
      ROADMAP_URL: ${ROADMAP_URL:-}
      ROADMAP_USERNAME: ${ROADMAP_USERNAME:-}
      ROADMAP_API_KEY: ${ROADMAP_API_KEY:-}
      LILDIARY_URL: ${LILDIARY_URL:-}
      LILDIARY_USERNAME: ${LILDIARY_USERNAME:-}
      LILDIARY_API_KEY: ${LILDIARY_API_KEY:-}
    volumes:
      - ./backend:/app
      - ../:/workspace-root
      - /var/run/docker.sock:/var/run/docker.sock
      - workspace_data:/workspaces
      - auth_providers_data:/auth_providers
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ─── Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  # ─── Nginx ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
      - frontend
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  workspace_data:
  auth_providers_data:
  uploads_data:

networks:
  internal:
    driver: bridge
