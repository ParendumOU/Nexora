version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nexora
      POSTGRES_USER: nexora
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexora_local}
    volumes:
      - nexora_data_postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexora"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-nexora_local}
    volumes:
      - nexora_data_redis:/var/lib/redis/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-nexora_local}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  nexora_data_postgres:
  nexora_data_redis:
